name: FastSync
version: '${project.version}'
main: com.fastsync.FastSync
api-version: '1.21.11'
folia-supported: true
authors: [FastSync]
description: High-performance cross-server player data synchronization using NBT byte[] serialization with LZ4 compression
website: https://github.com/Arbousier1/FastSync

libraries:
  - com.zaxxer:HikariCP:7.1.0
  - at.yawk.lz4:lz4-java:1.11.0
  - com.mysql:mysql-connector-j:9.7.0
  - org.redisson:redisson:4.6.1
  - org.jooq:jooq:3.21.6
  - com.github.ben-manes.caffeine:caffeine:3.2.4
  - org.reactivestreams:reactive-streams:1.0.4

commands:
  fastsync:
    description: FastSync admin command
    usage: /fastsync <reload|status|debug|saveall|log>
    permission: fastsync.admin
    aliases: [fsync, fs]

permissions:
  fastsync.admin:
    description: Allows access to FastSync admin commands
    default: op
  fastsync.bypass:
    description: Bypass synchronization (for testing)
    default: false
