name: FastSync
version: '${project.version}'
main: com.fastsync.FastSync
api-version: '1.21'
folia-supported: true
authors: [FastSync]
description: High-performance cross-server player data synchronization using NBT byte[] serialization with LZ4 compression
website: https://github.com/Arbousier1/FastSync

commands:
  fastsync:
    description: FastSync admin command
    usage: /fastsync <reload|status|debug|saveall>
    permission: fastsync.admin
    aliases: [fsync, fs]

permissions:
  fastsync.admin:
    description: Allows access to FastSync admin commands
    default: op
  fastsync.bypass:
    description: Bypass synchronization (for testing)
    default: false
