name: FastSync
version: '${version}'
main: com.fastsync.FastSync
api-version: '1.21'
folia-supported: true
authors: [FastSync]
description: High-performance cross-server player data synchronization using NBT byte[] serialization with LZ4/ZSTD compression
website: https://github.com/EllanServer/FastSync

libraries:
  - com.mysql:mysql-connector-j:9.7.0
  - org.redisson:redisson:4.6.1
  - org.reactivestreams:reactive-streams:1.0.4

commands:
  fastsync:
    description: FastSync admin command
    usage: /fastsync <reload|status|debug|saveall|log>
    permission: fastsync.admin
    aliases: [fsync, fs]

permissions:
  fastsync.admin:
    description: Allows access to FastSync admin commands
    default: op
  fastsync.bypass:
    description: Bypass synchronization (for testing)
    default: false
