# FastSync Messages - English (default)
# Uses MiniMessage formatting: <red>, <green>, <yellow>, <gray>, <gold>, <aqua>, <white>, <bold>
# Placeholders: {0}, {1}, {2}, ...
# Docs: https://docs.advntr.dev/minimessage/format.html

# ==================== Player Kick Messages ====================
player:
  kick:
    load-fail: "<red>[FastSync] Failed to load your player data. Please try reconnecting in a few seconds."
    lock-timeout: "<red>[FastSync] Your data is still being saved by another server. Please try reconnecting in a few seconds."
    busy: "<red>[FastSync] Data service is busy. Please reconnect in a few seconds."
    prepare-fail: "<red>[FastSync] Failed to prepare your data. Please reconnect."
    apply-fail: "<red>[FastSync] Failed to apply your data. Please reconnect."
    lock-lost: "<red>[FastSync] Your data lock was lost. Please reconnect to re-sync your data."

# ==================== Command Responses ====================
command:
  no-permission: "<red>You don't have permission to use this command."

  # --- Reload ---
  reload:
    success: "<green>[FastSync] Configuration reloaded."
    server: "<gray>Server: {0}"
    compression: "<gray>Compression: {0}"
    redis: "<gray>Redis: {0}"
    heartbeat: "<gray>Heartbeat: every {0}s (timer restarted)"
    protection-reset: "<green>[FastSync] Protection mode reset."
    protection-active: "<red>[FastSync] Protection mode still active: database is unhealthy."

  # --- Status ---
  status:
    checking: "<yellow>[FastSync] Checking backend health..."
    header: "<gold>===== FastSync Status ====="
    server: "<yellow>Server: <white>{0}"
    database-connected: "<yellow>Database: <green>Connected"
    database-disconnected: "<yellow>Database: <red>Disconnected"
    redis-connected: "<yellow>Redis: <green>Connected"
    redis-failed: "<yellow>Redis: <red>Failed"
    redis-disabled: "<yellow>Redis: <gray>Disabled"
    serialization: "<yellow>Serialization: <white>Paper native ItemStack byte serialization"
    active-players: "<yellow>Active players: <white>{0}"
    pending-loads: "<yellow>Pending loads: <white>{0}"
    pending-saves: "<yellow>Pending saves: <white>{0}"
    quarantined: "<yellow>Quarantined: <white>{0}"
    protection-active: "<yellow>Protection mode: <red>ACTIVE (DB failures detected)"
    protection-off: "<yellow>Protection mode: <green>Off"
    heartbeat: "<yellow>Heartbeat: <white>every {0}s (lock-timeout={1}s)"
    async-threads: "<yellow>Async threads: <white>active={0}, queue={1}"
    login-load-budget: "<yellow>Login load budget: <white>available={0}/{1} (max-concurrent-loads)"
    final-save-executor: "<yellow>Final-save executor: {0}active={1}, queue={2}/{3}, queueFull={4}, lastQueueFull={5}"
    final-save-spool-events: "<yellow>Final-save spool events: <white>spooled={0}, lastSpooled={1}, rejected={2}, lastRejected={3}"
    final-save-sync-fallback: "<yellow>Final-save sync fallback: <white>total={0}, last={1}"
    final-save-spool-disk: "<yellow>FinalSaveSpool: {0}pending={1}, failed={2}, bytes={3}"
    final-save-spool-last-replay: "<yellow>  lastReplay=<white>{0}"
    final-save-spool-last-error: "<red>  lastError={0}"
    final-save-spool-failed-entries: "<red>Spool FAILED entries exist — check {0}/failed/ for .reason.txt files."
    final-save-spool-rejected-alert: "<red>Final-save CRITICAL: spool rejected/failure occurred. Final states may have been lost. Check logs and spool configuration."
    final-save-sync-fallback-alert: "<red>Final-save CRITICAL: synchronous fallback occurred. Game thread may have been blocked. Investigate DB latency / final-save queue sizing."
    final-save-warning: "<yellow>Final-save WARNING: queue-full events have occurred. Spool handled some final saves; monitor queue sizing and replay lag."
    oplog: "<yellow>OpLog: {0}queue={1}/{2}, dropped={3}"
    oplog-alert: "<red>OpLog ALERT: audit entries have been dropped{0}. Treat operation log as incomplete for incident review."
    oplog-disabled: "<yellow>OpLog: <gray>Disabled"
    compression-enabled: "<yellow>Compression: <green>{0}"
    compression-disabled: "<yellow>Compression: <red>Disabled"
    debug-on: "<yellow>Debug: <green>ON"
    debug-off: "<yellow>Debug: <red>OFF"
    db-pool: "<yellow>DB Pool: <white>active={0}, idle={1}, total={2}, waiting={3}"
    latency-header: "<yellow>Latency: <gray>(p50/p99/p99.9)"
    latency-line: "<gray>  {0}"
    streams-enabled: "<yellow>Streams: <green>Enabled"
    streams-disabled: "<yellow>Streams: <red>Disabled"
    snapshots: "<yellow>Snapshots: {0}queue={1}/{2}, rejected={3}"
    cluster: "<yellow>Cluster: <white>{0}"
    cluster-none: "<yellow>Cluster: <white>(none)"
    production: "<yellow>Production: <green>ON (redis={0}, sync-fallback={1})"

  # --- Debug ---
  debug:
    toggled: "<green>[FastSync] Debug mode: {0}"

  # --- SaveAll ---
  saveall:
    saving: "<yellow>[FastSync] Saving all online players..."
    all-saved: "<green>[FastSync] All {0} players saved!"
    partial: "<yellow>[FastSync] Saved {0}/{1} players. <red>{2} failed."
    failed-players: "<gray>Failed players:"
    failed-player: "<gray>  {0}: <red>{1}"
    error: "<red>[FastSync] Saveall failed: {0}"

  # --- Log ---
  log:
    usage: "<red>Usage: /{0} log <player|uuid> [limit]"
    invalid-number: "<red>Invalid number: {0}"
    player-not-found: "<red>Player not found or invalid UUID: {0}"
    no-entries: "<yellow>[FastSync] No operation log entries for {0}"
    header: "<gold>===== Operation Log: {0} ({1} entries) ====="
    entry: "<gray>#{0} {1}<gray> | server={2} v={3} ft={4} sz={5}B{6}"

  # --- Help ---
  help:
    header: "<gold>===== FastSync ====="
    reload: "<yellow>/{0} reload <gray>- Reload configuration"
    status: "<yellow>/{0} status <gray>- Show plugin status"
    debug: "<yellow>/{0} debug <gray>- Toggle debug mode"
    saveall: "<yellow>/{0} saveall <gray>- Save all online players"
    log: "<yellow>/{0} log <player> [n] <gray>- View operation log for a player"

# ==================== Console Messages ====================
console:
  startup:
    enabled: "FastSync v{0} enabled!"
    server-id: "Server ID: {0}"
    serialization: "Serialization: Paper native ItemStack byte serialization"
    compression: "Compression: {0}"
    redis: "Redis: {0}"
    periodic-save: "Periodic save enabled: every {0} seconds"
    heartbeat-start: "Lock heartbeat {0}: every {1} seconds (lock-timeout={2}s)."
    heartbeat-restarted: "Lock heartbeat restarted: every {0} seconds (lock-timeout={1}s)."
    handoff-channel: "Registered fastsync:handoff plugin messaging channel (optional: for Velocity proxy integration)"
    dirty-tracking: "Dirty tracking enabled: validation every {0} saves"
    snapshot: "Snapshot/backup system enabled (max {0} per player)."
    pdc-strategy: "PDC sync strategy: {0}{1}"
  shutdown:
    saving: "Saving all online players (shutdown)..."
    save-result: "Shutdown save: {0}/{1} succeeded{2}."
    disabled: "FastSync disabled!"
  config:
    load-failed: "Failed to load config.yml — refusing to start: {0}"
    refusing-start: "Refusing to start: {0}"
    db-init-failed: "Failed to initialize database! Check your config.yml."
  saveall:
    failed: "Saveall failed"
  sender-retired: "Command sender retired before response could be sent"

# ==================== Proxy Messages ====================
proxy:
  command:
    header: "FastSync Proxy Commands:"
    status: "  /fastsync status  - Show aggregated backend status"
    players: "  /fastsync players - Show player→server mapping"
    reload: "  /fastsync reload  - Reload proxy config"
    debug: "  /fastsync debug   - Toggle debug mode"
  status:
    querying: "Querying backend servers..."
    no-backends: "No backends responded."
    header: "===== FastSync Proxy Status ====="
    backend: "  {0} | DB: {1} | Redis: {2} | Players: {3} | Save: {4} | Load: {5}"
    total-players: "Total players on proxy: {0}"
    query-failed: "Failed to query backends: {0}"
  players:
    none: "No tracked players."
    header: "===== Tracked Players ====="
    entry: "  {0} → {1}"
    total: "Total: {0} players"
  reload:
    success: "FastSync proxy config reloaded."
  debug:
    state: "Debug mode: {0}"
    hint: "(Edit proxy-config.yml and run /fastsync reload to change)"
  handoff:
    waiting: "<yellow>[FastSync] Waiting for your data to be saved..."
    timeout: "<red>[FastSync] Data save timed out, transferring anyway."
