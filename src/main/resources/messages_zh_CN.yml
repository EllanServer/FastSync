# FastSync 消息文件 - 简体中文
# 使用 MiniMessage 格式化: <red>, <green>, <yellow>, <gray>, <gold>, <aqua>, <white>, <bold>
# 占位符: {0}, {1}, {2}, ...
# 文档: https://docs.advntr.dev/minimessage/format.html

# ==================== 玩家踢出消息 ====================
player:
  kick:
    load-fail: "<red>[FastSync] 加载玩家数据失败。请稍后重试。"
    lock-timeout: "<red>[FastSync] 您的数据仍被另一个服务器保存中。请稍后重试。"
    busy: "<red>[FastSync] 数据服务繁忙。请稍后重试。"
    prepare-fail: "<red>[FastSync] 数据准备失败。请重新连接。"
    apply-fail: "<red>[FastSync] 数据应用失败。请重新连接。"
    lock-lost: "<red>[FastSync] 您的数据锁已丢失。请重新连接以重新同步数据。"

# ==================== 命令响应 ====================
command:
  no-permission: "<red>您没有权限使用此命令。"

  # --- 重载 ---
  reload:
    success: "<green>[FastSync] 配置已重载。"
    server: "<gray>服务器: {0}"
    compression: "<gray>压缩: {0}"
    redis: "<gray>Redis: {0}"
    heartbeat: "<gray>心跳: 每 {0} 秒（定时器已重启）"
    protection-reset: "<green>[FastSync] 保护模式已重置。"
    protection-active: "<red>[FastSync] 保护模式仍处于活动状态：数据库不健康。"

  # --- 状态 ---
  status:
    checking: "<yellow>[FastSync] 正在检查后端健康状态..."
    header: "<gold>===== FastSync 状态 ====="
    server: "<yellow>服务器: <white>{0}"
    database-connected: "<yellow>数据库: <green>已连接"
    database-disconnected: "<yellow>数据库: <red>未连接"
    redis-connected: "<yellow>Redis: <green>已连接"
    redis-failed: "<yellow>Redis: <red>失败"
    redis-disabled: "<yellow>Redis: <gray>未启用"
    serialization: "<yellow>序列化: <white>Paper 原生 ItemStack 字节序列化"
    active-players: "<yellow>在线玩家: <white>{0}"
    pending-loads: "<yellow>待加载: <white>{0}"
    pending-saves: "<yellow>待保存: <white>{0}"
    quarantined: "<yellow>已隔离: <white>{0}"
    protection-active: "<yellow>保护模式: <red>活跃（检测到数据库故障）"
    protection-off: "<yellow>保护模式: <green>关闭"
    heartbeat: "<yellow>心跳: <white>每 {0} 秒（锁超时={1} 秒）"
    async-threads: "<yellow>异步线程: <white>活跃={0}, 队列={1}"
    login-load-budget: "<yellow>登录加载预算: <white>可用={0}/{1}（最大并发加载）"
    final-save-executor: "<yellow>最终保存执行器: {0}活跃={1}, 队列={2}/{3}, 队列满={4}, 上次队列满={5}"
    final-save-spool-events: "<yellow>最终保存脱机事件: <white>已脱机={0}, 上次脱机={1}, 被拒={2}, 上次被拒={3}"
    final-save-sync-fallback: "<yellow>最终保存同步回退: <white>总计={0}, 上次={1}"
    final-save-spool-disk: "<yellow>最终保存脱机磁盘: {0}待处理={1}, 失败={2}, 字节={3}"
    final-save-spool-last-replay: "<yellow>  上次回放=<white>{0}"
    final-save-spool-last-error: "<red>  上次错误={0}"
    final-save-spool-failed-entries: "<red>脱机存在失败条目 — 请检查 {0}/failed/ 目录中的 .reason.txt 文件。"
    final-save-spool-rejected-alert: "<red>最终保存严重：脱机拒绝/故障已发生。最终状态可能已丢失。请检查日志和脱机配置。"
    final-save-sync-fallback-alert: "<red>最终保存严重：已发生同步回退。游戏线程可能被阻塞。请排查数据库延迟/最终保存队列大小。"
    final-save-warning: "<yellow>最终保存警告：已发生队列满事件。脱机已处理部分最终保存；请监控队列大小和回放延迟。"
    oplog: "<yellow>操作日志: {0}队列={1}/{2}, 丢弃={3}"
    oplog-alert: "<red>操作日志警报：审计条目已被丢弃{0}。操作日志不完整，请谨慎用于事件审查。"
    oplog-disabled: "<yellow>操作日志: <gray>未启用"
    compression-enabled: "<yellow>压缩: <green>{0}"
    compression-disabled: "<yellow>压缩: <red>未启用"
    debug-on: "<yellow>调试: <green>开启"
    debug-off: "<yellow>调试: <red>关闭"
    db-pool: "<yellow>数据库连接池: <white>活跃={0}, 空闲={1}, 总计={2}, 等待={3}"
    latency-header: "<yellow>延迟: <gray>(p50/p99/p99.9)"
    latency-line: "<gray>  {0}"
    streams-enabled: "<yellow>流: <green>已启用"
    streams-disabled: "<yellow>流: <red>未启用"
    snapshots: "<yellow>快照: {0}队列={1}/{2}, 拒绝={3}"
    cluster: "<yellow>集群: <white>{0}"
    cluster-none: "<yellow>集群: <white>(无)"
    production: "<yellow>生产模式: <green>开启 (redis={0}, 同步回退={1})"

  # --- 调试 ---
  debug:
    toggled: "<green>[FastSync] 调试模式: {0}"

  # --- 全部保存 ---
  saveall:
    saving: "<yellow>[FastSync] 正在保存所有在线玩家..."
    all-saved: "<green>[FastSync] 所有 {0} 个玩家已保存！"
    partial: "<yellow>[FastSync] 已保存 {0}/{1} 个玩家。<red>{2} 个失败。"
    failed-players: "<gray>失败玩家:"
    failed-player: "<gray>  {0}: <red>{1}"
    error: "<red>[FastSync] 全部保存失败: {0}"

  # --- 日志 ---
  log:
    usage: "<red>用法: /{0} log <玩家名|UUID> [数量]"
    invalid-number: "<red>无效数字: {0}"
    player-not-found: "<red>未找到玩家或 UUID 无效: {0}"
    no-entries: "<yellow>[FastSync] 没有找到 {0} 的操作日志"
    header: "<gold>===== 操作日志: {0}（{1} 条记录）====="
    entry: "<gray>#{0} {1}<gray> | 服务器={2} v={3} ft={4} 大小={5}B{6}"

  # --- 帮助 ---
  help:
    header: "<gold>===== FastSync ====="
    reload: "<yellow>/{0} reload <gray>- 重载配置"
    status: "<yellow>/{0} status <gray>- 显示插件状态"
    debug: "<yellow>/{0} debug <gray>- 切换调试模式"
    saveall: "<yellow>/{0} saveall <gray>- 保存所有在线玩家"
    log: "<yellow>/{0} log <玩家> [n] <gray>- 查看玩家操作日志"

# ==================== 控制台消息 ====================
console:
  startup:
    enabled: "FastSync v{0} 已启用！"
    server-id: "服务器 ID: {0}"
    serialization: "序列化: Paper 原生 ItemStack 字节序列化"
    compression: "压缩: {0}"
    redis: "Redis: {0}"
    periodic-save: "定期保存已启用: 每 {0} 秒"
    heartbeat-start: "锁心跳 {0}: 每 {1} 秒（锁超时={2} 秒）。"
    heartbeat-restarted: "锁心跳已重启: 每 {0} 秒（锁超时={1} 秒）。"
    handoff-channel: "已注册 fastsync:handoff 插件消息通道（可选: 用于 Velocity 代理集成）"
    dirty-tracking: "脏数据跟踪已启用: 每 {0} 次保存验证"
    snapshot: "快照/备份系统已启用（每位玩家最多 {0} 个）。"
    pdc-strategy: "PDC 同步策略: {0}{1}"
  shutdown:
    saving: "正在保存所有在线玩家（关闭中）..."
    save-result: "关闭保存: {0}/{1} 成功{2}。"
    disabled: "FastSync 已禁用！"
  config:
    load-failed: "加载 config.yml 失败 — 拒绝启动: {0}"
    refusing-start: "拒绝启动: {0}"
    db-init-failed: "数据库初始化失败！请检查 config.yml。"
  saveall:
    failed: "全部保存失败"
  sender-retired: "命令发送者在响应发送前已退出"

# ==================== 代理消息 ====================
proxy:
  command:
    header: "FastSync 代理命令:"
    status: "  /fastsync status  - 显示后端聚合状态"
    players: "  /fastsync players - 显示玩家→服务器映射"
    reload: "  /fastsync reload  - 重载代理配置"
    debug: "  /fastsync debug   - 切换调试模式"
  status:
    querying: "正在查询后端服务器..."
    no-backends: "没有后端响应。"
    header: "===== FastSync 代理状态 ====="
    backend: "  {0} | 数据库: {1} | Redis: {2} | 玩家: {3} | 保存: {4} | 加载: {5}"
    total-players: "代理上的总玩家数: {0}"
    query-failed: "查询后端失败: {0}"
  players:
    none: "没有跟踪的玩家。"
    header: "===== 已跟踪玩家 ====="
    entry: "  {0} → {1}"
    total: "总计: {0} 个玩家"
  reload:
    success: "FastSync 代理配置已重载。"
  debug:
    state: "调试模式: {0}"
    hint: "（编辑 proxy-config.yml 并运行 /fastsync reload 来更改）"
  handoff:
    waiting: "<yellow>[FastSync] 正在等待您的数据保存..."
    timeout: "<red>[FastSync] 数据保存超时，正在强制转移。"
