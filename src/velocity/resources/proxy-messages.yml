# ============================================================
# FastSync Proxy Messages
# ============================================================
# Messages for the Velocity proxy plugin.
# Uses MiniMessage formatting: <red>, <green>, <yellow>, <gray>, <gold>, <aqua>, <white>
# Placeholders: {0}, {1}, {2}, ...
# Docs: https://docs.advntr.dev/minimessage/format.html
# ============================================================

# ==================== /fastsync command help ====================
proxy:
  command:
    header: "<gold>FastSync Proxy Commands:"
    status: "<yellow>  /fastsync status  - Show aggregated backend status"
    players: "<yellow>  /fastsync players - Show player to server mapping"
    reload: "<yellow>  /fastsync reload  - Reload proxy config"
    debug: "<yellow>  /fastsync debug   - Toggle debug mode"

  # ==================== /fastsync status ====================
  status:
    querying: "<yellow>Querying backend servers..."
    no-backends: "<red>No backends responded."
    header: "<gold>===== FastSync Proxy Status ====="
    # {0}=serverName  {1}=dbStatus  {2}=redisStatus  {3}=players  {4}=pendingSaves  {5}=pendingLoads
    backend: "<aqua>  {0} <gray>| DB: {1}<gray> | Redis: {2}<gray> | Players: <white>{3}<gray> | Save: <white>{4}<gray> | Load: <white>{5}"
    total-players: "<gray>Total players on proxy: {0}"
    query-failed: "<red>Failed to query backends: {0}"

  # ==================== /fastsync players ====================
  players:
    none: "<yellow>No tracked players."
    header: "<gold>===== Tracked Players ====="
    # {0}=playerName  {1}=serverName
    entry: "<aqua>  {0}<yellow> -> {1}"
    total: "<gray>Total: {0} players"

  # ==================== /fastsync reload ====================
  reload:
    success: "<green>FastSync proxy config reloaded."

  # ==================== /fastsync debug ====================
  debug:
    state: "<yellow>Debug mode: {0}"
    hint: "<gray>(Runtime only; edit proxy-config.yml to persist across restarts)"
