name: Paper E2E Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21
  COMPOSE_FILE: docker-compose.paper-test.yml

jobs:
  paper-e2e:
    name: Paper ${{ matrix.paper-version }} E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - paper-version: "1.21.11"
            minecraft-image: "itzg/minecraft-server"
            paper-memory: "512M"
          - paper-version: "26.2"
            minecraft-image: "itzg/minecraft-server:java25"
            paper-memory: "512M"
    env:
      PAPER_VERSION: ${{ matrix.paper-version }}
      MINECRAFT_IMAGE: ${{ matrix.minecraft-image }}
      PAPER_MEMORY: ${{ matrix.paper-memory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build FastSync plugin
        run: ./gradlew build --no-daemon -x test

      - name: Prepare E2E plugins directory
        run: |
          rm -rf e2e/plugins
          mkdir -p e2e/plugins
          # Single JAR: Sparrow libs are shaded in, Maven Central deps are
          # auto-downloaded by Paper via plugin.yml libraries.
          cp build/libs/FastSync-1.0.0.jar e2e/plugins/
          chmod -R 777 e2e/plugins
          echo "Plugin: $(ls -1 e2e/plugins)"

      - name: Start Paper E2E environment
        run: |
          docker compose -f "$COMPOSE_FILE" down -v || true
          docker compose -f "$COMPOSE_FILE" up -d

      - name: Wait for Paper servers to start
        run: |
          wait_for_log() {
            local container="$1"
            local pattern="$2"
            local timeout="${3:-240}"
            echo "Waiting up to ${timeout}s for $container to log: $pattern"
            for ((i = 0; i < timeout; i++)); do
              if docker logs "$container" 2>&1 | grep -qE "$pattern"; then
                echo "$container ready (${i}s)"
                return 0
              fi
              sleep 1
            done
            echo "ERROR: $container did not become ready within ${timeout}s"
            docker logs "$container" --tail 80
            return 1
          }
          wait_for_log "fastsync-paper-a" "Done \([0-9]+\.[0-9]+s\)! For help, type \"help\"" 300
          wait_for_log "fastsync-paper-b" "Done \([0-9]+\.[0-9]+s\)! For help, type \"help\"" 300

      - name: Run E2E verification
        run: ./scripts/e2e-verify.sh

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p e2e-logs
          for c in fastsync-mysql fastsync-redis fastsync-paper-a fastsync-paper-b; do
            docker logs "$c" > "e2e-logs/$c.log" 2>&1 || true
          done

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paper-e2e-logs
          path: |
            e2e-logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down E2E environment
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v || true
