name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

# Cancel in-flight runs for the same branch on subsequent pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_VERSION: 9.5.1
  JAVA_VERSION: 21

jobs:
  # Compile against both ends of the supported Paper API range. Paper 26.2
  # publishes Java 25 class files, while FastSync keeps Java 21 bytecode.
  api-compat:
    name: Paper ${{ matrix.paper-version }} API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - paper-version: "1.21.11"
            java-version: "21"
          - paper-version: "26.2.build.40-alpha"
            java-version: "25"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Compile against Paper API
        run: >-
          ./gradlew clean compileJava compileTestJava verifyJava21Bytecode --no-daemon --stacktrace
          -Ppaper.version=${{ matrix.paper-version }}

  # ---------------------------------------------------------------------------
  # Job 1: build — compile, run unit tests, and assemble JARs
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run gradle build
        run: |
          set -o pipefail
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build-output.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-output-log
          path: build-output.log
          retention-days: 7

      - name: Print test results on failure
        if: failure()
        run: |
          echo "=== Test results XML ==="
          find build/test-results/test -name "*.xml" -exec cat {} \; || true
          echo "=== End test results ==="

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fastsync-jars
          path: |
            build/libs/FastSync-*.jar
          retention-days: 14
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 2: ci — full pipeline (build + integration tests with MySQL)
  # ---------------------------------------------------------------------------
  ci:
    name: Full CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fastsync_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot; then
              echo "MySQL is up"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run full CI pipeline
        run: ./gradlew ci --no-daemon --stacktrace

      - name: Print test results on failure
        if: failure()
        run: |
          echo "=== Test results XML ==="
          find build/test-results/test -name "*.xml" -exec cat {} \; || true
          echo "=== End test results ==="

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-artifacts
          path: |
            build/libs/
            build/reports/
            build/test-results/
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 3: release — build + tag + publish (only on tagged commits)
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, ci]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build release artifacts
        run: ./gradlew ci --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/libs/FastSync-*.jar
            build/libs/FastSync-Proxy-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
