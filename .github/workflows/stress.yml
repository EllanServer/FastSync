name: Stress Tests

on:
  # Run on PRs and pushes to main so regressions in DB-layer throughput / lock
  # correctness are caught before merge. Manual dispatch is also supported.
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  # Nightly full run to catch DB-driver / Testcontainer image drift.
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_VERSION: 9.5.1
  JAVA_VERSION: 21

jobs:
  stress:
    name: DB Stress (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-stress-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run stress tests
        run: ./gradlew stressTest --no-daemon --stacktrace

      - name: Print stress test results on failure
        if: failure()
        run: |
          echo "=== Stress test results XML ==="
          find build/test-results/stressTest -name "*.xml" -exec cat {} \; || true
          echo "=== End stress test results ==="
